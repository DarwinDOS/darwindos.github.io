<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Это шо, портфолио?</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }

    header {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b, #020617);
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #94a3b8;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card iframe {
      width: 100%;
      height: 300px;
      border: none;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin-bottom: 8px;
    }

    .card-content p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      padding: 30px;
      margin-top: 40px;
      color: #64748b;
      border-top: 1px solid #1e293b;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <h1>Да, это портфолио. Почти</h1>
  <p>3D Artist | Game Assets | Visualization</p>
</header>

<section class="container">
  <div class="grid">

    <!-- Model 1 -->
    <div class="card">
      <iframe src="https://sketchfab.com/3d-models/low-poly-japan-building-d92fbbd18d304e6795656677e4445768/embed" allowfullscreen></iframe>
      <div class="card-content">
        <h3>Японский домишко</h3>
        <p>Ну просто лоупольное здание</p>
      </div>
    </div>

    <!-- Model 2 -->
    <div class="card">
      <iframe src="https://sketchfab.com/3d-models/lowpoly-suburban-house-76b36c015ac3400d8539fc6f7f22d1bd/embed" allowfullscreen></iframe>
      <div class="card-content">
        <h3>Американский домишко</h3>
        <p>Те же яйца, только в профиль</p>
      </div>
    </div>

    <!-- Model 3 -->
    <div class="card">
      <iframe src="https://sketchfab.com/3d-models/christmass-decorated-house-1c8b91dc594c42a6bfcf3df00a80b794/embed" allowfullscreen></iframe>
      <div class="card-content">
        <h3>Новогодний домишко</h3>
        <p>Ласт кристмас ай гив ю май модел</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 DarwinDOS | Сделано с ❤️</p>
</footer>

</body>
</html>
